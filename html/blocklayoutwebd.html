<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    *{
        margin: 0%;
    }
    .parent{
        height: 100vh;
        width: 100vw;
        display: grid;
        grid-template-columns: repeat(10,1fr);
        grid-template-rows: repeat(10,1fr);
        background-color: cyan;
        column-gap: 15px;

    }
    #child1{
        background-color: black;
        grid-column: 2/7;
        grid-row: 2/8;
        }
        #child2{
          background-color: black; 
          grid-column: 7/10;
           grid-row: 2/8;
        }

    

</style>
</head>
<body>
    <div class="parent">
        <div id="child1"></div>
        <div id="child2">
        </div>
    </div>
    
</body>
</html>
